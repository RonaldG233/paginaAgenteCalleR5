<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="variables.css">
    <title>Document</title>
</head>
<body>
<div class="ventana">
  <section class="ventana_registro">
    <!-- Título con logo -->
    <div class="titulo_registro">
      <img src="LogooR5.png" class="texto_titulo" alt="Logo Classic Prestige MEN">
    </div>

    <!-- Zona de campos (fondo café) -->
    <div class="campos_registro">
      <section class="seccion_campos_registro">
        <form id="formLogin" novalidate class="formulario1">

          <div class="grupo_campo">
            <input class="input" id="correo" type="text" name="correo" placeholder="Correo electrónico" required autocomplete="off" >
          </div>

          <div class="grupo_campo">
            <input class="input" id="contrasena" type="password" name="contrasena" placeholder="Contraseña" required>
          </div>

          <div class="contenedor_boton">
            <button type="submit" class="boton_registrarse">INICIAR SESIÓN</button>
            <a href="#registro" class="cambio-pagina">Crear cuenta</a>
          </div>
          
        </form>
      </section>
    </div>
  </section>
</div>
</body>
</html>
