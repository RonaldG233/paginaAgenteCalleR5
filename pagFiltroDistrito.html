<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - Dashboard</title>
    <link rel="stylesheet" href="variables.css">
</head>
<body>
    <div class="content_primer_pagina">
        <div class="titulo_primer_pagina">VENTAS</div>
        <div class="titulo_logo">
            <img src="LogooR5.png" class="titulo_sayayin" alt="Logo">
        </div>
        <div class="nombreZonaDistrito">

            <div class="nombreDistrito">NOMBRE DE LA ZONA DEL DISTRITO ELEGIDO</div>
        </div>
    </div>

    <div class="main_container">
        
        <div class="sidebar_filtros">
            <div class="filtro_primer_pagina">
                <div class="filtro_zonaYdistrito">
                    <p>DISTRITO:</p>
                    <!-- <select name="distrito" id="miSelectDistritos" class="select_filtro">
                        <option value="d1">Distrito 1</option>
                        <option value="d2">Distrito 2</option> -->
                        <select id="selectDistrito" class="select_filtro">
                            <option value="">Seleccione un distrito</option>
                        </select>
                    <!-- </select> -->  
                </div>
            </div>
        </div>

        <div class="dashboard_content">
            
            <div class="fichaDistritoZona full-width">
                <div class="titulo__fichaDistritoZona">NOMBRE DEL DISTRITO</div>
                <div class="grid_ficha">
                    <div class="datosFicha"><div class="nombre_datosFicha">Nombre Dato</div><div class="numero_datosFicha">10%</div></div>
                    <div class="datosFicha"><div class="nombre_datosFicha">Nombre Dato</div><div class="numero_datosFicha">20%</div></div>
                    <div class="datosFicha"><div class="nombre_datosFicha">Nombre Dato</div><div class="numero_datosFicha">30%</div></div>
                    <div class="datosFicha"><div class="nombre_datosFicha">Nombre Dato</div><div class="numero_datosFicha">40%</div></div>
                    <div class="datosFicha"><div class="nombre_datosFicha">Nombre Dato</div><div class="numero_datosFicha">40%</div></div>
                    <div class="datosFicha"><div class="nombre_datosFicha">Nombre Dato</div><div class="numero_datosFicha">40%</div></div>
                    </div>
            </div>

            <div class="tabla_marketShare full-width">
                <div class="titulo_tabla_marketShare">TENDENCIA DE ACCESO POR OPERADORES</div>
                <div class="marketShare">
                    Área de Gráfico de Tendencias
                </div>
            </div>

        </div>
    </div>
<script src="script.js"></script>
